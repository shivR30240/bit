name: deploy on vm
on:
  push:
    branches:
      - demo23 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

       # ✅ Login to Docker Hub
      - name: Docker Hub login
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      # ✅ Build & Push image
      - name: Build & Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/flask-app:latest .
          docker push ${{ secrets.DOCKER_USER }}/flask-app:latest

      - name:  login on server
        run: |
          mkdir .ssh
          cd .ssh
          echo "${{ secrets.shiv }}" > shiv
          ls -ltr
          chmod 600 shiv
          ls -ltr
          pwd
          cat shiv
          ssh -i shiv -o StrictHostKeyChecking=no yashjain200502@136.119.161.16 << 'EOF'
            pwd
            docker pull ${{ secrets.DOCKER_USER }}/flask-app:latest
            docker stop flask || true
            docker rm flask
            docker run --name flask -d -p 5000:5000 ${{ secrets.DOCKER_USER }}/flask-app:latest
          EOF