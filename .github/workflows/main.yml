name: deploy on vm
on:
  push:
    branches:
      - demo23 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name:  login on server
        run: |
          mkdir .ssh
          cd .ssh
          echo "${{ secrets.shiv }}" > shiv
          ls -ltr
          chmod 600 shiv
          ls -ltr
          pwd
          cat shiv
          ssh -i shiv -o StrictHostKeyChecking=no yashjain200502@35.194.7.214 << 'EOF'
            pwd
            sudo apt-get update
            sudo apt install python3-pip -y
            sudo apt install python3-venv -y
            sudo apt install git -y
            sudo apt update
            sudo apt install ca-certificates curl
            sudo install -m 0755 -d /etc/apt/keyrings
            sudo curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
            sudo chmod a+r /etc/apt/keyrings/docker.asc
            
            # Add the repository to Apt sources:
            sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
            Types: deb
            URIs: https://download.docker.com/linux/debian
            Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
            Components: stable
            Architectures: $(dpkg --print-architecture)
            Signed-By: /etc/apt/keyrings/docker.asc
            EOF
            
            sudo apt update
            sudo apt install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            if [ -d "bit1" ]; then
              echo "Directory bit1 already exists. Pulling latest changes."
              cd bit1
              git pull origin demo23
            else
              echo "Directory bit1 does not exist. Cloning repository."
              git clone https://github.com/shivR30240/bit bit1
              cd bit1
            fi
            git checkout demo23
           
            docker rm flask 
            docker build -t img .
            docker run --name flask -d -p 5000:5000 img


          EOF

     
